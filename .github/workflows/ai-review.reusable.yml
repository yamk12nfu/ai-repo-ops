# =============================================================================
# Reusable AI Review — aro guard による決定的検証（policies の機械的 enforcement）
#
# 互換性契約（凍結）:
#   この workflow の公開インターフェースは workflow_call の inputs / secrets の
#   「名前」である。ここを変えると全対象 repo の sync（配布側 ai-review.yml の
#   更新）が必要になるため、変更は破壊的変更として扱う（RELEASE.md §1 参照）。
#     inputs:  config_path / lock_path
#     secrets: anthropic_api_key（旧エンジン時代の契約。下記「経緯」参照）
#
# 経緯（docs/plans/02-ai-review-commenter.md の方向転換注記）:
#   v0.1.1 までのエンジンは claude-code-action による AI レビューだったが、
#   「AI はローカル、CI は決定的検証」の方針転換により、AI 不要の `aro guard`
#   （docs/guard.md）に差し替えた（計画 03 Stage 1-2）。エンジン差し替えは
#   互換性契約の範囲内であり、対象 repo 側の変更は不要（v1 タグ移動で切り替わる）。
#   secrets.anthropic_api_key は受け取り口だけ残し、使用しない。
#
# 設計（docs/guard.md / docs/security.md）:
#   - guard は読み取り専用。検証ルール（.ai/project.yaml / policy）は PR からは
#     書き換えられない merge-base 側 revision から読む（自己改変の防止）。
#   - AI レビュー（non-blocking）と異なり、guard は違反時に job を fail させる
#     （required check にしてよい）。
#   - secrets 不要のため fork PR でも実行できる（旧エンジンの fork skip は廃止）。
#   - base に .ai/project.yaml が無い場合（ai-repo-ops 導入 PR 等）は検証不能として
#     明示 skip し、workflow は成功する（理由を step summary に出力）。
# =============================================================================
name: Reusable AI Review

on:
  workflow_call:
    inputs:
      config_path:
        required: true
        type: string
      lock_path:
        required: false
        type: string
        default: ".ai/ai-repo-ops.lock.yaml"
    secrets:
      anthropic_api_key:
        description: >-
          旧エンジン（AI レビュー）の互換性契約として残る受け取り口。
          現在の guard エンジンは使用しない（未設定でよい）。
        required: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # 違反時の PR コメント投稿に使用（fork PR では token が read-only のため
      # 投稿は失敗しうるが、continue-on-error で無視する。判定は job の成否で伝わる）
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # merge-base の解決と base...HEAD の diff に全履歴が必要
          fetch-depth: 0
          persist-credentials: false

      # 註: 旧エンジン時代にあった「HEAD 側の config 存在チェック（test -f）」は置かない。
      # guard は検証ルールを merge-base 側から読むため、HEAD の config 有無は判定材料に
      # ならない（PR が .ai/project.yaml を削除したケースも guard 自身が project_config
      # violation として報告する — precheck で落とすと違反一覧が出ずに終わってしまう）。

      - name: Gate — pull_request イベント以外は skip
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=pull_request イベントではない（event: $EVENT_NAME）。guard は PR の diff に対してのみ実行する。" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare review artifacts directory
        id: artifacts
        if: steps.gate.outputs.skip != 'true'
        run: |
          artifacts_dir="$(mktemp -d "$RUNNER_TEMP/aro-review.XXXXXX")"
          echo "dir=$artifacts_dir" >> "$GITHUB_OUTPUT"

      - name: Checkout guard engine (ai-repo-ops)
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          # この reusable workflow 自身と同じ repo・同じ commit の CLI を使う（workflow と
          # エンジンのバージョン一致を保証）。job.workflow_repository / job.workflow_sha は
          # 「このジョブを定義する workflow ファイル」の repo と commit SHA（公式 docs が
          # reusable workflow の自己 checkout に示す組み合わせ）。取得できない環境（GHES 等）
          # では中央 repo の v1（この workflow が配布される互換ライン）へフォールバック。
          repository: ${{ job.workflow_repository || 'yamk12nfu/ai-repo-ops' }}
          ref: ${{ job.workflow_sha || 'v1' }}
          path: .aro-engine
          persist-credentials: false

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          node-version: 20

      - name: Build aro CLI
        if: steps.gate.outputs.skip != 'true'
        working-directory: .aro-engine
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run aro guard
        id: guard
        if: steps.gate.outputs.skip != 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          set +e
          node .aro-engine/packages/aro-cli/dist/cli.js guard \
            --repo . --base "origin/$BASE_REF" --json \
            > "$ARTIFACTS_DIR/guard-result.json" 2> "$ARTIFACTS_DIR/guard-error.json"
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 3 ]; then
            # 検証不能（unexpected）のうち「base にルールが無い」は導入 PR 等の正常系
            # として skip 扱いにする（docs/guard.md「merge-base 側から読む」参照）
            err_code="$(jq -r '.error.code // ""' "$ARTIFACTS_DIR/guard-error.json" 2>/dev/null || echo "")"
            echo "error_code=$err_code" >> "$GITHUB_OUTPUT"
            if [ "$err_code" = "PROJECT_CONFIG_NOT_FOUND" ] || [ "$err_code" = "POLICY_NOT_FOUND" ]; then
              echo "not_guardable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            cat "$ARTIFACTS_DIR/guard-error.json" >&2
            exit 3
          fi
          if [ "$code" -ne 0 ] && [ "$code" -ne 1 ]; then
            # 仕様外の exit code（node の signal 死・CLI 起動失敗・将来の exit 2 等）は
            # 見逃さず即失敗に倒す（required check が誤って green になるのを防ぐ）
            cat "$ARTIFACTS_DIR/guard-error.json" >&2 || true
            exit "$code"
          fi
          if [ "$code" -eq 1 ]; then
            # 違反テーブルを一度だけ生成し、summary / PR コメントの両方で使う。
            # path / message は PR 作者が制御できる入力（ファイル名等）を含むため、
            # Markdown テーブルを壊す文字（|・改行）をエスケープする。
            jq -r '
              def esc: tostring | gsub("\\|"; "\\|") | gsub("\r"; "") | gsub("\n"; "<br>");
              .report.violations[] | "| \(.kind|esc) | \((.path // "-")|esc) | \(.message|esc) |"
            ' "$ARTIFACTS_DIR/guard-result.json" > "$ARTIFACTS_DIR/guard-violations.md"
          fi
          # exit 0（違反なし）/ 1（違反あり）はここでは失敗にせず、summary 出力後に判定する
          exit 0

      - name: Run knowledge check
        id: knowledge
        if: steps.gate.outputs.skip != 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          INDEX_PATH=".ai/local/knowledge/index.yaml"
          head_has_index=false
          base_has_index=false
          if [ -e "$INDEX_PATH" ] || [ -L "$INDEX_PATH" ]; then
            head_has_index=true
          fi
          if git cat-file -e "origin/$BASE_REF:$INDEX_PATH" 2>/dev/null; then
            base_has_index=true
          fi
          if [ "$head_has_index" = "false" ] && [ "$base_has_index" = "false" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "reason=HEADにもbaseにもknowledge indexが存在しない（未導入repo）" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          strict=false
          if ! git diff --quiet "origin/$BASE_REF...HEAD" -- ".ai/local/knowledge/"; then
            strict=true
          fi
          echo "strict=$strict" >> "$GITHUB_OUTPUT"

          set +e
          if [ "$strict" = "true" ]; then
            node .aro-engine/packages/aro-cli/dist/cli.js knowledge check \
              --repo . --source .aro-engine --strict --json \
              > "$ARTIFACTS_DIR/knowledge-result.json" 2> "$ARTIFACTS_DIR/knowledge-error.json"
          else
            node .aro-engine/packages/aro-cli/dist/cli.js knowledge check \
              --repo . --source .aro-engine --json \
              > "$ARTIFACTS_DIR/knowledge-result.json" 2> "$ARTIFACTS_DIR/knowledge-error.json"
          fi
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

          if [ "$code" -ne 0 ] && [ "$code" -ne 1 ]; then
            cat "$ARTIFACTS_DIR/knowledge-error.json" >&2 || true
            exit "$code"
          fi

          jq -r '
            def esc: tostring | gsub("\\|"; "\\|") | gsub("\r"; "") | gsub("\n"; "<br>");
            .report.findings[]
            | select(.status != "pass")
            | "| \(.status|esc) | \((.entryId // "-")|esc) | \((.path // "-")|esc) | \(.message|esc) |"
          ' "$ARTIFACTS_DIR/knowledge-result.json" > "$ARTIFACTS_DIR/knowledge-findings.md"
          # exit 1（検証FAIL）はsummary出力後に専用stepでfailさせる。
          exit 0

      - name: Write step summary
        if: always()
        env:
          SKIP: ${{ steps.gate.outputs.skip }}
          SKIP_REASON: ${{ steps.gate.outputs.reason }}
          GUARD_EXIT: ${{ steps.guard.outputs.exit_code }}
          NOT_GUARDABLE: ${{ steps.guard.outputs.not_guardable }}
          ERROR_CODE: ${{ steps.guard.outputs.error_code }}
          CONFIG_PATH: ${{ inputs.config_path }}
          KNOWLEDGE_SKIP: ${{ steps.knowledge.outputs.skip }}
          KNOWLEDGE_SKIP_REASON: ${{ steps.knowledge.outputs.reason }}
          KNOWLEDGE_EXIT: ${{ steps.knowledge.outputs.exit_code }}
          KNOWLEDGE_STRICT: ${{ steps.knowledge.outputs.strict }}
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          {
            echo "## AI Review (aro guard)"
            echo ""
            if [ "$SKIP" = "true" ]; then
              echo "- 状態: **skipped**"
              echo "- 理由: $SKIP_REASON"
            elif [ "$NOT_GUARDABLE" = "true" ]; then
              echo "- 状態: **skipped**（検証ルール不在: \`$ERROR_CODE\`）"
              echo "- base に \`.ai/project.yaml\` / policy が無いため guard は検証できない。"
              echo "  ai-repo-ops 導入 PR は導入完了後の PR から guard 対象になる（docs/guard.md 参照）。"
            elif [ "$GUARD_EXIT" = "0" ]; then
              echo "- 状態: **passed** — policies 違反なし"
            elif [ "$GUARD_EXIT" = "1" ]; then
              echo "- 状態: **violations found** — この job は fail する"
              echo ""
              echo "| kind | path | 内容 |"
              echo "|---|---|---|"
              cat "$ARTIFACTS_DIR/guard-violations.md"
            else
              echo "- 状態: **error**（guard exit: ${GUARD_EXIT:-unknown}）— job log を参照"
            fi
            echo "- config: \`$CONFIG_PATH\`"

            echo ""
            echo "## Repo Knowledge"
            echo ""
            if [ "$SKIP" = "true" ]; then
              echo "- 状態: **skipped** — workflow自体がskip"
            elif [ "$KNOWLEDGE_SKIP" = "true" ]; then
              echo "- 状態: **skipped**"
              echo "- 理由: $KNOWLEDGE_SKIP_REASON"
            elif [ "$KNOWLEDGE_EXIT" = "0" ] || [ "$KNOWLEDGE_EXIT" = "1" ]; then
              if [ "$KNOWLEDGE_EXIT" = "0" ]; then
                echo "- 状態: **checked** — blocking failureなし"
              else
                echo "- 状態: **failures found** — このjobはfailする"
              fi
              echo "- strict: \`${KNOWLEDGE_STRICT:-false}\`"
              echo "- entries: $(jq -r '.report.summary.entries' "$ARTIFACTS_DIR/knowledge-result.json")"
              echo "- warnings: $(jq -r '.report.summary.warned' "$ARTIFACTS_DIR/knowledge-result.json")"
              echo "- failures: $(jq -r '.report.summary.failed' "$ARTIFACTS_DIR/knowledge-result.json")"
              echo "- stale: $(jq -r '.report.summary.stale' "$ARTIFACTS_DIR/knowledge-result.json")"
              if [ -s "$ARTIFACTS_DIR/knowledge-findings.md" ]; then
                echo ""
                echo "| status | entry | path | 内容 |"
                echo "|---|---|---|---|"
                cat "$ARTIFACTS_DIR/knowledge-findings.md"
              fi
            else
              echo "- 状態: **error**（knowledge exit: ${KNOWLEDGE_EXIT:-unknown}）— job logを参照"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment violations on PR
        if: steps.guard.outputs.exit_code == '1'
        # fork PR では GITHUB_TOKEN が read-only のため投稿に失敗しうる。
        # 判定自体は job の成否（次ステップの fail）で伝わるので、失敗は無視する。
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ARTIFACTS_DIR: ${{ steps.artifacts.outputs.dir }}
        run: |
          {
            echo "## aro guard: policies 違反を検出しました"
            echo ""
            echo "| kind | path | 内容 |"
            echo "|---|---|---|"
            cat "$ARTIFACTS_DIR/guard-violations.md"
            echo ""
            echo "検証ルールは base 側の \`.ai/project.yaml\` と適用 policy から読まれます（PR 内の変更では緩められません）。詳細: docs/guard.md"
          } > "$ARTIFACTS_DIR/guard-comment.md"
          gh pr comment "$PR_NUMBER" --body-file "$ARTIFACTS_DIR/guard-comment.md"

      - name: Fail on violations
        if: steps.guard.outputs.exit_code == '1'
        run: |
          echo "aro guard が policies 違反を検出しました。詳細は step summary / PR コメントを参照してください。"
          exit 1

      - name: Fail on knowledge violations
        if: steps.knowledge.outputs.exit_code == '1'
        run: |
          echo "aro knowledge check がblocking failureを検出しました。詳細はstep summaryを参照してください。"
          exit 1
