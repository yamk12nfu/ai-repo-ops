# 互換性のためだけに残している legacy stub（計画 03 Stage 2-2）。
#
# CI 内で AI 改善は実行しない方針（改善ループは開発者のローカル環境で回す。
# docs/local-improve-loop.md 参照）のため、呼び出し側 ai-improve.yml は配布物から
# 除去済み。この reusable workflow は、除去前に seed された既存 repo の
# `uses: ...@v1` 参照が workflow 解決エラーで赤くならないためだけに残している。
# inputs は互換性契約として凍結（RELEASE.md §1）。書き込み権限は持たない。
name: Reusable AI Improve

on:
  workflow_call:
    inputs:
      config_path:
        required: true
        type: string
      lock_path:
        required: false
        type: string
        default: ".ai/ai-repo-ops.lock.yaml"
      mode:
        required: false
        type: string
        default: "maintenance"

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deprecated notice
        run: |
          echo "::notice::ai-improve is deprecated: AI improvement runs locally, not in CI."
          echo "This workflow is a no-op kept for compatibility with already-seeded repos."
          echo "Remove .github/workflows/ai-improve.yml from this repo (see aro doctor)."
          echo "config_path=${{ inputs.config_path }}"
          echo "lock_path=${{ inputs.lock_path }}"
          echo "mode=${{ inputs.mode }}"
