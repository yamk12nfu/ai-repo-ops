name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # engines.node が >=20。最低要件(20)と開発系(24)の両方で回す。
        node-version: ["20", "24"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false

      # packageManager フィールド(pnpm@9.x)を corepack 経由で有効化する。
      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # authoritative schema と distribution 配布コピーの drift を検出する（手動 build 前でも走る plain ESM）。
      - name: Check managed schema copy
        run: pnpm schema:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # 配布経路（pack した tarball からのインストール）の退行を検出する smoke test（計画 04）。
  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack aro-cli
        run: pnpm -C packages/aro-cli pack --pack-destination "$RUNNER_TEMP"

      - name: Install tarball and run smoke test
        run: |
          set -euo pipefail
          INSTALL_DIR="$RUNNER_TEMP/install"
          mkdir -p "$INSTALL_DIR"
          cd "$INSTALL_DIR"
          npm init -y > /dev/null
          npm install "$RUNNER_TEMP"/ai-repo-ops-aro-cli-*.tgz > /dev/null
          ./node_modules/.bin/aro --help > /dev/null
          ./node_modules/.bin/aro knowledge --help > /dev/null
          echo "aro --help + knowledge --help OK"
          FIXTURE="$RUNNER_TEMP/fixture"
          mkdir -p "$FIXTURE" && git -C "$FIXTURE" init -q
          ./node_modules/.bin/aro init --repo "$FIXTURE" --source "$GITHUB_WORKSPACE" > /dev/null
          ./node_modules/.bin/aro doctor --repo "$FIXTURE" --source "$GITHUB_WORKSPACE" > /dev/null
          git -C "$FIXTURE" config user.email "aro-smoke@example.com"
          git -C "$FIXTURE" config user.name "aro smoke"
          git -C "$FIXTURE" add -A
          git -C "$FIXTURE" commit -qm "chore: initialize ai-repo-ops"
          ./node_modules/.bin/aro knowledge init \
            --repo "$FIXTURE" --base HEAD --source "$GITHUB_WORKSPACE" > /dev/null
          ./node_modules/.bin/aro knowledge check \
            --repo "$FIXTURE" --source "$GITHUB_WORKSPACE" --strict > /dev/null
          test -f "$FIXTURE/.ai/local/knowledge/index.yaml"
          test -f "$FIXTURE/.ai/local/knowledge/overview.md"
          echo "init + doctor + knowledge init/check with --source OK"

      - name: Source-not-found error is helpful
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/install"
          FIXTURE2="$RUNNER_TEMP/fixture2"
          mkdir -p "$FIXTURE2" && git -C "$FIXTURE2" init -q
          set +e
          OUT="$(./node_modules/.bin/aro init --repo "$FIXTURE2" --json 2>&1)"
          CODE=$?
          set -e
          echo "$OUT"
          # tarball install では上方探索が成立しないため、validation error（exit 1）として
          # SOURCE_NOT_FOUND + --source の案内つきで fail すること（文字列一致ではなく
          # 安定した error.code で検証し、別の失敗による誤検出を防ぐ）
          test "$CODE" -eq 1
          node -e '
            const obj = JSON.parse(process.argv[1]);
            if (obj.error?.code !== "SOURCE_NOT_FOUND") process.exit(1);
            if (!obj.error?.hint?.includes("--source")) process.exit(1);
          ' "$OUT"
          echo "SOURCE_NOT_FOUND error OK"

      # 第一級サポート経路（中央 repo クローン + pnpm link --global）の smoke test。
      # link 経由なら実体が workspace 内に留まり、--source なしで上方探索が機能すること。
      - name: Link --global smoke test
        run: |
          set -euo pipefail
          export PNPM_HOME="$RUNNER_TEMP/pnpm-home"
          mkdir -p "$PNPM_HOME"
          export PATH="$PNPM_HOME:$PATH"
          pnpm -C packages/aro-cli link --global
          FIXTURE3="$RUNNER_TEMP/fixture3"
          mkdir -p "$FIXTURE3" && git -C "$FIXTURE3" init -q
          cd "$RUNNER_TEMP"
          aro init --repo "$FIXTURE3" > /dev/null
          aro doctor --repo "$FIXTURE3" > /dev/null
          echo "link --global: init + doctor without --source OK"
