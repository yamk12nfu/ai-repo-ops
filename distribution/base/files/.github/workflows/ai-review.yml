name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai_review:
    uses: yamk12nfu/ai-repo-ops/.github/workflows/ai-review.reusable.yml@v1
    with:
      config_path: ".ai/project.yaml"
      lock_path: ".ai/ai-repo-ops.lock.yaml"
    # secrets: inherit は使わない（明示的な受け渡しのみ許可する方針）。
    # anthropic_api_key は旧AIエンジンとの互換性契約として明示的に渡す。
    # 現行 guard はこの secret を使用しないため、未登録でも動作に影響しない。
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
