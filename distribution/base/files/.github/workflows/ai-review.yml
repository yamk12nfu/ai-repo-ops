name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai_review:
    uses: yamk12nfu/ai-repo-ops/.github/workflows/ai-review.reusable.yml@v1
    with:
      config_path: ".ai/project.yaml"
      lock_path: ".ai/ai-repo-ops.lock.yaml"
    # secrets: inherit は使わない（明示的な受け渡しのみ許可する方針）。
    # ANTHROPIC_API_KEY は対象 repo の Actions secrets に登録する。
    # 未登録・fork PR の場合、AI レビューは明示的に skip される（workflow は成功する）。
    secrets:
      anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
