name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai_review:
    uses: yamk12nfu/ai-repo-ops/.github/workflows/ai-review.reusable.yml@v1
    with:
      config_path: ".ai/project.yaml"
      lock_path: ".ai/ai-repo-ops.lock.yaml"
